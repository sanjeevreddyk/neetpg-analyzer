# fly.toml app configuration file generated for neetpg-analyzer on 2026-05-28T09:19:53Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'neetpg-analyzer'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_PATH = '/data/neet_pg_bank_v2.db'
  NODE_ENV = 'production'
  PORT = '8080'
  UPLOAD_DIR = '/data/uploads'

[[mounts]]
  source = 'neetpg_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
