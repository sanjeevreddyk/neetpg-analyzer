# fly.toml configuration file for NEET PG Question Analyzer
#
# Refer to https://fly.io/docs/reference/configuration/ for details

app = "neetpg-analyzer"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "neetpg_data"
  destination = "/data"

[env]
  NODE_ENV = "production"
  PORT = "5000"
  DATABASE_PATH = "/data/neet_pg_bank_v2.db"
  UPLOAD_DIR = "/data/uploads"
